            transition: transform 0.2s;
            flex-shrink: 0;

            width: 36px;
            height: 36px;

            width: 200%;
            height: 200%;

            container.innerHTML = style + htmlContent;

        // =================================================================

        document.querySelectorAll('.app-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.app-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentApp = this.dataset.app;
                document.querySelectorAll('.app-link').forEach(link => {
                    link.classList.toggle('active-app-link', link.dataset.app === currentApp);
                });
                renderWallBill(currentApp, currentLang);
                localStorage.setItem('selectedApp', currentApp);
                localStorage.setItem('selectedLang', currentLang);
            });
        });

        document.querySelectorAll('.app-link').forEach(link => {
            link.addEventListener('click', function() {
                const app = this.dataset.app;
                const btn = document.querySelector(`.app-btn[data-app="${app}"]`);
                if (btn) btn.click();
            });
        });

        document.getElementById('langSelect').addEventListener('change', function() {
            currentLang = this.value;
            renderWallBill(currentApp, currentLang);
            localStorage.setItem('selectedLang', currentLang);
        });

        // =================================================================
        // 6. العرض الأولي (اللغة الافتراضية: الإنجليزية)
        // =================================================================
        const savedApp = localStorage.getItem('selectedApp');
        const savedLang = localStorage.getItem('selectedLang') || 'en';
        if (savedApp) {
            const btn = document.querySelector(`.app-btn[data-app="${savedApp}"]`);

                document.querySelectorAll('.app-btn').forEach(b => b.classList.remove('active'));

            currentLang = savedLang;
